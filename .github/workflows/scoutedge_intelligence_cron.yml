name: scoutedge-intelligence cron

on:
  schedule:
    # poly_snapshot: top of every hour
    - cron: '0 * * * *'
    # run_attribution: every 30 minutes
    - cron: '*/30 * * * *'
    # precompute_predictions: every 6 hours
    - cron: '0 */6 * * *'
    # weekly_report: Sunday 23:00 UTC
    - cron: '0 23 * * 0'
    # backfill_match_results: daily at 03:00 UTC (must run before seed-elo)
    - cron: '0 3 * * *'
    # seed_elo: daily at 04:00 UTC
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      job:
        description: Which job to run manually
        required: true
        default: precompute
        type: choice
        options:
          - poly_snapshot
          - attribution
          - precompute
          - weekly_report
          - backfill_results
          - backfill_then_seed
          - seed_elo
      backfill_since:
        description: Optional YYYY-MM-DD lower bound for backfill jobs (blank = rolling 14 days)
        required: false
        default: ''
        type: string
      upload_unmatched:
        description: Upload unmatched-fixtures CSV as a workflow artifact
        required: false
        default: true
        type: boolean

defaults:
  run:
    working-directory: scoutedge_intelligence

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
  API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}

jobs:
  # ---------------------------------------------------------------------------
  # Hourly: Polymarket snapshot
  # ---------------------------------------------------------------------------
  poly_snapshot:
    name: Poly Snapshot (hourly)
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.job == 'poly_snapshot') ||
      (github.event_name == 'schedule' && github.event.schedule == '0 * * * *')
    concurrency:
      group: poly_snapshot
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run poly_snapshot
        run: python -m scoutedge_intelligence.scripts.poly_snapshot

  # ---------------------------------------------------------------------------
  # Every 30 min: Attribution
  # ---------------------------------------------------------------------------
  attribution:
    name: Run Attribution (every 30 min)
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.job == 'attribution') ||
      (github.event_name == 'schedule' && startsWith(github.event.schedule, '*/30'))
    concurrency:
      group: run_attribution
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run run_attribution
        run: python -m scoutedge_intelligence.scripts.run_attribution

  # ---------------------------------------------------------------------------
  # Every 6 hours: Precompute predictions
  # ---------------------------------------------------------------------------
  precompute:
    name: Precompute Predictions (every 6 h)
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.job == 'precompute') ||
      (github.event_name == 'schedule' && startsWith(github.event.schedule, '0 */6'))
    concurrency:
      group: precompute_predictions
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run precompute_predictions
        run: python -m scoutedge_intelligence.scripts.precompute_predictions

  # ---------------------------------------------------------------------------
  # Weekly Sunday 23:00 UTC: Weekly report
  # ---------------------------------------------------------------------------
  weekly_report:
    name: Weekly Report (Sun 23:00 UTC)
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.job == 'weekly_report') ||
      (github.event_name == 'schedule' && github.event.schedule == '0 23 * * 0')
    concurrency:
      group: weekly_report
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run weekly_report
        run: >
          python -m scoutedge_intelligence.scripts.weekly_report
          --output-dir artifacts/weekly
          --webhook-url ${{ secrets.SCOUTEDGE_WEEKLY_WEBHOOK }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Upload weekly report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-report-${{ github.run_id }}
          path: scoutedge_intelligence/artifacts/weekly/*.md
          retention-days: 90

  # ---------------------------------------------------------------------------
  # Daily 03:00 UTC: Backfill historical match results from API-Football
  # Runs 1h BEFORE seed-elo so the reseed picks up newly-finalized matches.
  # Rolling 14-day window to keep API-Football quota tight; first-time/full
  # backfill is a manual workflow_dispatch invocation.
  # ---------------------------------------------------------------------------
  backfill_results:
    name: Backfill Match Results (daily 03:00 UTC)
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'workflow_dispatch' && contains(fromJSON('["backfill_results", "backfill_then_seed"]'), inputs.job)) ||
      (github.event_name == 'schedule' && github.event.schedule == '0 3 * * *')
    continue-on-error: false
    concurrency:
      group: scoutedge_intelligence_backfill_results
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Compute --since
        id: since
        env:
          BACKFILL_SINCE: ${{ inputs.backfill_since }}
        run: |
          if [ -n "$BACKFILL_SINCE" ]; then
            if [[ ! "$BACKFILL_SINCE" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
              echo "::error title=Invalid backfill_since::Expected YYYY-MM-DD"
              exit 1
            fi
            printf 'value=%s\n' "$BACKFILL_SINCE" >> "$GITHUB_OUTPUT"
          else
            printf 'value=%s\n' "$(date -u -d '14 days ago' +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare artifact directory
        run: mkdir -p artifacts/backfill

      - name: Run backfill_match_results
        run: >
          python -m scoutedge_intelligence.scripts.backfill_match_results
          --since ${{ steps.since.outputs.value }}
          --unmatched-out artifacts/backfill/unmatched.csv

      - name: Upload unmatched backfill artifact
        if: github.event_name == 'workflow_dispatch' && inputs.upload_unmatched
        uses: actions/upload-artifact@v4
        with:
          name: backfill-unmatched-${{ github.run_id }}
          path: scoutedge_intelligence/artifacts/backfill/unmatched.csv
          if-no-files-found: ignore
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Daily 04:00 UTC: Seed elo_ratings from finished matches
  # ---------------------------------------------------------------------------
  seed-elo:
    name: Seed ELO Ratings (daily 04:00 UTC)
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.job == 'seed_elo') ||
      (github.event_name == 'schedule' && github.event.schedule == '0 4 * * *')
    continue-on-error: false
    concurrency:
      group: scoutedge_intelligence_seed_elo
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run seed_elo
        run: python -m scoutedge_intelligence.scripts.seed_elo --since 2018-01-01

  # ---------------------------------------------------------------------------
  # Manual chain: backfill first, then seed elo_ratings from the updated matches.
  # ---------------------------------------------------------------------------
  seed-elo-after-backfill:
    name: Seed ELO Ratings (after backfill)
    runs-on: ubuntu-latest
    needs: backfill_results
    if: github.event_name == 'workflow_dispatch' && inputs.job == 'backfill_then_seed'
    continue-on-error: false
    concurrency:
      group: scoutedge_intelligence_seed_elo
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run seed_elo
        run: python -m scoutedge_intelligence.scripts.seed_elo --since 2018-01-01
